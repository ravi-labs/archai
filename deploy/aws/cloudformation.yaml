AWSTemplateFormatVersion: "2010-09-09"
Description: >
  ArchAI static hosting — a private S3 bucket served over HTTPS by CloudFront
  (Origin Access Control). Single static site; no servers. Account-portable:
  deploy the same template in any AWS account. SSO/auth is a separate layer
  (see deploy/aws/README.md) so this base stays simple and reusable.

Resources:
  SiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      # No explicit name → CloudFormation auto-names it, so the same template
      # deploys cleanly in any account with no global-name collisions.
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  OAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AWS::StackName}-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  Distribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub "ArchAI (${AWS::StackName})"
        DefaultRootObject: index.html
        PriceClass: PriceClass_100
        Origins:
          - Id: s3origin
            DomainName: !GetAtt SiteBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt OAC.Id
            S3OriginConfig:
              OriginAccessIdentity: ""
        DefaultCacheBehavior:
          TargetOriginId: s3origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD]
          Compress: true
          # Managed cache policy "CachingOptimized".
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html

  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SiteBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontRead
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${SiteBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${Distribution.Id}"

Outputs:
  BucketName:
    Description: S3 bucket holding the site
    Value: !Ref SiteBucket
  DistributionId:
    Description: CloudFront distribution id (for cache invalidation)
    Value: !Ref Distribution
  URL:
    Description: Public HTTPS URL of the site
    Value: !Sub "https://${Distribution.DomainName}"
